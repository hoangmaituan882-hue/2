# Replace example.com and api.example.com before installing.
# Suggested path: /etc/nginx/sites-available/anysoul.conf

limit_req_zone $binary_remote_addr zone=anysoul_api_login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=anysoul_api_general:10m rate=60r/m;

server {
  listen 80;
  server_name example.com www.example.com api.example.com;

  location /.well-known/acme-challenge/ {
    root /var/www/letsencrypt;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name example.com www.example.com;

  ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  root /var/www/anysoul/dist;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(?:js|css|png|jpg|jpeg|gif|webp|svg|ico|woff2?)$ {
    expires 30d;
    access_log off;
    try_files $uri =404;
  }
}

server {
  listen 443 ssl http2;
  server_name api.example.com;

  ssl_certificate /etc/letsencrypt/live/api.example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.example.com/privkey.pem;

  client_max_body_size 8m;

  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  location /api/auth/login {
    limit_req zone=anysoul_api_login burst=10 nodelay;
    proxy_pass http://127.0.0.1:8787;
    include /etc/nginx/snippets/proxy-headers.conf;
  }

  location /api/auth/register {
    limit_req zone=anysoul_api_login burst=5 nodelay;
    proxy_pass http://127.0.0.1:8787;
    include /etc/nginx/snippets/proxy-headers.conf;
  }

  location / {
    limit_req zone=anysoul_api_general burst=120 nodelay;
    proxy_pass http://127.0.0.1:8787;
    include /etc/nginx/snippets/proxy-headers.conf;
  }
}
